<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Abstract isothermic surface / curvature net motif -->
  <rect width="64" height="64" fill="#1a1814" rx="8"/>
  <!-- Two crossing ellipses suggesting a curvature net on a surface -->
  <ellipse cx="32" cy="32" rx="22" ry="10" fill="none" stroke="#c8c0b0" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="32" cy="32" rx="10" ry="22" fill="none" stroke="#c8c0b0" stroke-width="1.5" opacity="0.9"/>
  <!-- small center dot -->
  <circle cx="32" cy="32" r="2.5" fill="#c8c0b0"/>
</svg>
